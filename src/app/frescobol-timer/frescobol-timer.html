<div class="container" [attr.data-theme]="theme()">
  <nav class="theme-switcher">
    <button (click)="setTheme('default')" [class.active]="theme() === 'default'">Padrão</button>
    <button (click)="setTheme('solar')" [class.active]="theme() === 'solar'">☀️ Dia</button>
    <button (click)="setTheme('night')" [class.active]="theme() === 'night'">🌙 Noite</button>

    <button class="sound-toggle" (click)="toggleSound()" [class.muted]="!isSoundEnabled()">
      {{ isSoundEnabled() ? '🔊 Som On' : '🔇 Mudo' }}
    </button>
  </nav>

  <header class="dashboard">
    <div class="actions">
      <button class="btn-reset" (click)="reset()">Limpar</button>

      @if (historico().length > 0) {
        <button class="btn-export" (click)="exportarDados()">📥 Exportar CSV</button>
      }
    </div>

    <div class="stats-grid">
      <div class="stat-item">
        <label>Distância</label>
        <input type="number" [(ngModel)]="distancia" />
      </div>

      <div class="stat-item main">
        <small>Última</small>
        <span class="value">{{ velocidadeAtualKmH() }}</span>
        <small>km/h</small>
      </div>

      <div class="stat-item">
        <small>Média (10)</small>
        <span class="avg">{{ mediaVelocidadeKmH() }}</span>
        <small>km/h</small>
      </div>
    </div>

    <button class="btn-reset" (click)="reset()">Reset</button>
  </header>

  <main class="touch-zones">
    <div class="zone left" (touchstart)="registrarToque()">Lado A</div>
    <div class="zone right" (touchstart)="registrarToque()">Lado B</div>
  </main>

  <footer class="history-bar">
    @for (v of historico(); track $index) {
      <div class="history-dot" [style.height.%]="v * 2">
        <span class="dot-label">{{ (v * 3.6).toFixed(0) }}</span>
      </div>
    } @empty {
      <div class="empty-state">
        <div class="pulse-ring"></div>
        <div class="empty-content">
          <span class="icon">🎾</span>
          <p>Aguardando primeira batida...</p>
          <small>Toque em qualquer lado para iniciar</small>
        </div>
      </div>
    }
  </footer>
</div>
